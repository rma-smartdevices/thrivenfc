<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TapID</title>
    <style>
      .bg {
        background-image: url(img/DSC04533\ copy.jpg);
        height: 100vh;
        background-repeat: no-repeat;
        background-size: cover;
      }

      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }

      footer {
        width: 100%;
        background-color: #111;
        color: #bbb;
        text-align: center;
        padding: 15px 10px;
        font-size: 14px;
        position: fixed;
        bottom: 0;
        left: 0;
      }

      footer span {
        color: #ffffff;
        font-weight: bold;
      }

      footer a {
        color: #4da6ff;
        text-decoration: none;
        margin: 0 6px;
      }

      footer a:hover {
        text-decoration: underline;
      }

      header {
        color: white;
        padding: 2em;
        text-align: center;
        width: 100%;
      }

      h1 {
        margin: 0.2em 0;
        font-size: 2em;
      }

      p {
        color: white;
        margin: 0.5em 0 2em 0;
      }

      #copyright {
        color: #666;
      }

      .links {
        width: 90%;
        max-width: 300px;
      }

      /* LINK STYLE */
      .link {
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: white;
        margin: 0.5em 0;
        padding: 1em;
        border-radius: 8px;
        text-decoration: none;
        color: #222;
        font-weight: bold;
        transition: background 0.3s;
        position: relative;
      }

      .link:hover {
        background-color: #ddd;
      }
      /* SMALL LOGO */
      .link-logo {
        position: absolute;
        left: 56px;
        width: 24px;
        height: 24px;
        border-radius: 4px;
      }
      /* JIGGLE ANIMATION */
      @keyframes jiggle {
        0% {
          transform: rotate(0deg);
        }
        1% {
          transform: rotate(-8deg);
        }
        2% {
          transform: rotate(8deg);
        }
        3% {
          transform: rotate(-6deg);
        }
        4% {
          transform: rotate(6deg);
        }
        5% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }

      .profile-pic {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        margin-bottom: 1em;
        object-fit: cover;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>

  <body class="bg">
    <header>
      <img class="profile-pic" src="monet-logo" alt="Profile Picture" />
      <h1>Monet Media Productions</h1>
      <p>
        Transformamos ideas en producciónes impactantes <br />
        📸 Fotografía | 🎬 Producción
      </p>
    </header>

    <div class="links">
      <a
        class="link"
        href="https://instagram.com/monetmediaproductions"
        target="_blank"
      >
        <img class="link-logo" src="whitegram-logo.png" alt="Instagram logo" />
        Instagram
      </a>

      <a class="link" href="tel:4133069008" target="_blank">
        <img
          class="link-logo"
          src="img/—Pngtree—flat contact icon download_4602063.png"
          alt="Phone logo"
        />
        Contact Me
      </a>
    </div>

    <footer>
      <p id="copyright">
        © 2026 <span>RMA Smart Devices</span>. All Rights Reserved.
      </p>
      <p id="copyright">Designed & Developed by Ricardo Moreno Ayala</p>
    </footer>
  </body>
</html>
